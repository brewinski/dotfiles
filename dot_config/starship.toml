"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 500

format = """
$os\
$directory\
$git_branch\
$git_status\
$golang\
$rust\
$nodejs\
$python\
$lua\
$terraform\
$docker_context\
$cmd_duration\
$fill\
$time\
$line_break\
$character"""

palette = "catppuccin_frappe"

[palettes.catppuccin_frappe]
rosewater = "#f2d5cf"
flamingo  = "#eebebe"
pink      = "#f4b8e4"
mauve     = "#ca9ee6"
red       = "#e78284"
maroon    = "#ea999c"
peach     = "#ef9f76"
yellow    = "#e5c890"
green     = "#a6d189"
teal      = "#81c8be"
sky       = "#99d1db"
sapphire  = "#85c1dc"
blue      = "#8caaee"
lavender  = "#babbf1"
text      = "#c6d0f5"
subtext1  = "#b5bfe2"
subtext0  = "#a5adce"
overlay2  = "#949cbb"
overlay1  = "#838ba7"
overlay0  = "#737994"
surface2  = "#626880"
surface1  = "#51576d"
surface0  = "#414559"
base      = "#303446"

[os]
disabled = false
style = "fg:overlay0"
format = "[$symbol]($style) "

[os.symbols]
Macos = ""
Linux = ""
Ubuntu = ""

[directory]
style = "bold fg:blue"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "fg:red"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = ""
"github"    = ""
"gitea"     = "󰘚"
"Development" = ""

[git_branch]
symbol = " "
style = "fg:mauve"
format = "[$symbol$branch]($style) "

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "fg:yellow"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
staged     = "[+${count}](green)"
modified   = "[~${count}](yellow)"
untracked  = "[?${count}](overlay2)"
deleted    = "[-${count}](red)"
conflicted = "[!${count}](red)"

[fill]
symbol = " "

[time]
disabled = false
style = "fg:overlay0"
format = "[$time]($style)"
time_format = "%H:%M"

[cmd_duration]
min_time = 2_000
style = "fg:peach"
format = "[ $duration]($style) "

[golang]
symbol = " "
style = "fg:sky"
format = "[$symbol($version )]($style)"

[rust]
symbol = " "
style = "fg:peach"
format = "[$symbol($version )]($style)"

[nodejs]
symbol = " "
style = "fg:green"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "fg:yellow"
format = "[$symbol($version )]($style)"

[lua]
symbol = " "
style = "fg:blue"
format = "[$symbol($version )]($style)"

[terraform]
symbol = "󱁢 "
style = "fg:mauve"
format = "[$symbol$workspace]($style) "

[docker_context]
symbol = " "
style = "fg:sapphire"
format = "[$symbol$context]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"
