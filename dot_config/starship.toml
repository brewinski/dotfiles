"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 500

format = """
$os\
$directory\
$git_branch\
$git_status\
$golang\
$rust\
$nodejs\
$python\
$lua\
$terraform\
$docker_context\
$cmd_duration\
$fill\
$time\
$line_break\
$character"""

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"

[os]
disabled = false
style = "fg:overlay0"
format = "[$symbol]($style) "

[os.symbols]
Macos = ""
Linux = ""
Ubuntu = ""

[directory]
style = "bold fg:blue"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "fg:red"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = ""
"github"    = ""
"gitea"     = "󰘚"
"Development" = ""

[git_branch]
symbol = " "
style = "fg:mauve"
format = "[$symbol$branch]($style) "

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "fg:yellow"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
staged     = "[+${count}](green)"
modified   = "[~${count}](yellow)"
untracked  = "[?${count}](overlay2)"
deleted    = "[-${count}](red)"
conflicted = "[!${count}](red)"

[fill]
symbol = " "

[time]
disabled = false
style = "fg:overlay0"
format = "[$time]($style)"
time_format = "%H:%M"

[cmd_duration]
min_time = 2_000
style = "fg:peach"
format = "[ $duration]($style) "

[golang]
symbol = " "
style = "fg:sky"
format = "[$symbol($version )]($style)"

[rust]
symbol = " "
style = "fg:peach"
format = "[$symbol($version )]($style)"

[nodejs]
symbol = " "
style = "fg:green"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "fg:yellow"
format = "[$symbol($version )]($style)"

[lua]
symbol = " "
style = "fg:blue"
format = "[$symbol($version )]($style)"

[terraform]
symbol = "󱁢 "
style = "fg:mauve"
format = "[$symbol$workspace]($style) "

[docker_context]
symbol = " "
style = "fg:sapphire"
format = "[$symbol$context]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"
