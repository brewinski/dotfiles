"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 500

format = """
[](fg:surface0)\
$os\
[](bg:surface1 fg:surface0)\
$directory\
[](fg:surface1 bg:mauve)\
$git_branch\
$git_status\
[](fg:mauve)\
 $golang$rust$nodejs$python$lua$terraform$docker_context\
$fill\
$cmd_duration\
[](fg:surface1)\
$time\
[](fg:surface1)\
$line_break\
$character"""

palette = "catppuccin_frappe"

[palettes.catppuccin_frappe]
rosewater = "#f2d5cf"
flamingo  = "#eebebe"
pink      = "#f4b8e4"
mauve     = "#ca9ee6"
red       = "#e78284"
maroon    = "#ea999c"
peach     = "#ef9f76"
yellow    = "#e5c890"
green     = "#a6d189"
teal      = "#81c8be"
sky       = "#99d1db"
sapphire  = "#85c1dc"
blue      = "#8caaee"
lavender  = "#babbf1"
text      = "#c6d0f5"
subtext1  = "#b5bfe2"
subtext0  = "#a5adce"
overlay2  = "#949cbb"
overlay1  = "#838ba7"
overlay0  = "#737994"
surface2  = "#626880"
surface1  = "#51576d"
surface0  = "#414559"
base      = "#303446"

[os]
disabled = false
style = "bg:surface0 fg:overlay2"
format = "[ $symbol ]($style)"

[os.symbols]
Macos = ""
Linux = ""
Ubuntu = ""

[directory]
style = "bg:surface1 bold fg:blue"
format = "[ $path]($style)[$read_only](bg:surface1 fg:red) "
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = ""
"github"    = ""
"gitea"     = "󰘚"
"Development" = ""

[git_branch]
symbol = " "
style = "bg:mauve fg:base bold"
format = "[ $symbol$branch ]($style)"

[git_status]
format = "([$all_status$ahead_behind ]($style))"
style = "bg:mauve fg:base"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
staged     = "[+${count}](fg:green bg:mauve)"
modified   = "[~${count}](fg:yellow bg:mauve)"
untracked  = "[?${count}](fg:subtext0 bg:mauve)"
deleted    = "[-${count}](fg:red bg:mauve)"
conflicted = "[!${count}](fg:red bg:mauve)"

[fill]
symbol = " "

[time]
disabled = false
style = "bg:surface1 fg:overlay2"
format = "[ $time ]($style)"
time_format = "%H:%M"

[cmd_duration]
min_time = 2_000
style = "fg:peach"
format = "[ $duration]($style) "

[golang]
symbol = " "
style = "fg:sky"
format = "[$symbol($version )]($style)"

[rust]
symbol = " "
style = "fg:peach"
format = "[$symbol($version )]($style)"

[nodejs]
symbol = " "
style = "fg:green"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "fg:yellow"
format = "[$symbol($version )]($style)"

[lua]
symbol = " "
style = "fg:blue"
format = "[$symbol($version )]($style)"

[terraform]
symbol = "󱁢 "
style = "fg:mauve"
format = "[$symbol$workspace]($style) "

[docker_context]
symbol = " "
style = "fg:sapphire"
format = "[$symbol$context]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"
