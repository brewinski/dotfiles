set-option -sg escape-time 10
set-option -g focus-events on

# Set leader to space bar
# Set prefix to Ctrl-Space
unbind C-b
set -g prefix C-s
bind C-Space send-prefix

# Fix Colors
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# Renumber windows
set-option -g renumber-windows on

# Statusline Colors
set -g status-style bg=terminal,fg=terminal

# Statusline location
set -g status-position bottom 

# Current window name bold
set -g window-status-current-style fg=terminal,bold

# Split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.config/tmux/tmux.conf

# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Catppuccin Frappe
frappe_base="#303446"
frappe_surface1="#51576d"
frappe_overlay0="#737994"
frappe_text="#c6d0f5"
frappe_blue="#8caaee"
frappe_mauve="#ca9ee6"
frappe_green="#a6d189"
frappe_yellow="#e5c890"
frappe_red="#e78284"

# clock mode
setw -g clock-mode-colour "$frappe_blue"

# copy mode
setw -g mode-style "fg=$frappe_text bg=$frappe_surface1 bold"

# pane borders
set -g pane-border-style "fg=$frappe_surface1"
set -g pane-active-border-style "fg=$frappe_blue"

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=$frappe_base fg=$frappe_text"
set -g status-left "#[fg=$frappe_blue,bold] #S #[fg=$frappe_surface1]│ "
set -g status-right "#[fg=$frappe_overlay0] %Y-%m-%d %H:%M "
set -g status-right-length 50
set -g status-left-length 30

setw -g window-status-current-style "fg=$frappe_base bg=$frappe_blue bold"
setw -g window-status-current-format " #I #W "

setw -g window-status-style "fg=$frappe_overlay0"
setw -g window-status-format " #I #W "

setw -g window-status-bell-style "fg=$frappe_yellow bg=$frappe_red bold"

# messages
set -g message-style "fg=$frappe_yellow bg=$frappe_base bold"

# vim movements for tmux’s copy mode
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl
# set -g @plugin 'jimeh/tmux-themepack' # to configure tmux theme
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes

# set -g @themepack 'powerline/default/cyan' # use this theme for tmux

# setup a key mapping plugin to help with key mapping discovery 
set -g @plugin 'alexwforsythe/tmux-which-key'

set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
set -g @continuum-restore 'on' # enable tmux-continuum functionality

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
